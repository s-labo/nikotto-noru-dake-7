<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>にこっと乗るだけ7 デジタルパンフレット｜カーサービス山形｜新車4WD軽自動車 月々定額カーリース</title>
<meta name="description" content="株式会社カーサービス山形「にこっと乗るだけ7」。新車の4WD軽自動車が月々11,000円〜の定額カーリース。車両代・自動車税・車検・メンテ・ロードサービスまで全部コミコミ。ページをめくる感覚でサービスをご覧いただけます。">
<meta name="theme-color" content="#16243f">
<meta property="og:title" content="にこっと乗るだけ7 デジタルパンフレット｜カーサービス山形">
<meta property="og:description" content="新車4WD軽自動車が月々定額・コミコミ。創業47年・山形県内9店舗のカーサービス山形がお届けする、ページをめくるデジタルパンフレット。">
<meta property="og:type" content="website">
<style>
:root{
  --navy:#16243f; --navy-2:#1f3257; --orange:#f07800; --orange-2:#ff8c1a;
  --ink:#222e3d; --muted:#69748a; --line:#dfe4ee; --paper:#ffffff; --paper-2:#fbfaf7;
  --pink:#e6007e; --blue:#0a86b8; --red:#d33f1f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",YuGothic,"Noto Sans JP",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1100px 700px at 50% -8%,#2a3c63,transparent 60%),
    linear-gradient(160deg,#0f1a30 0%,#16243f 55%,#0c1424 100%);
  min-height:100%;-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}

/* ---------- top brand bar ---------- */
.appbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:8px clamp(16px,4vw,40px);color:#fff}
.logo{display:flex;align-items:center;gap:12px}
.logo .csy{font-family:Georgia,"Times New Roman",serif;font-weight:800;font-style:italic;font-size:26px;color:#fff;line-height:1}
.logo .sub{font-size:9px;letter-spacing:.2em;color:var(--orange-2);line-height:1.5;font-weight:700}
.appbar .tag{font-size:12px;letter-spacing:.1em;color:rgba(255,255,255,.72);text-align:right}
.appbar .tag b{color:var(--orange-2)}
@media(max-width:640px){.appbar .tag{display:none}}

/* ---------- stage ---------- */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 14px 12px;gap:12px}
.viewport{perspective:2600px;display:flex;align-items:center;justify-content:center}
.book{position:relative;width:var(--pw);height:var(--ph);transition:transform .6s ease;transform-style:preserve-3d}
.paper{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:left center;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,.15,.2,1)}
.paper.flipped{transform:rotateY(-180deg)}
.face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;background:var(--paper);border-radius:3px;box-shadow:0 16px 38px rgba(8,14,28,.42);border:1px solid rgba(22,36,63,.12)}
.face.back{transform:rotateY(180deg)}
.mode-spread .face.front{border-radius:3px 9px 9px 3px}
.mode-spread .face.back{border-radius:9px 3px 3px 9px}
.mode-single .face{border-radius:8px}
.mode-single .paper.flipped{pointer-events:none}
.face::after{content:"";position:absolute;top:0;bottom:0;width:30px;pointer-events:none;z-index:6}
.mode-spread .face.front::after{left:0;background:linear-gradient(90deg,rgba(22,36,63,.20),rgba(22,36,63,.05) 50%,transparent)}
.mode-spread .face.back::after{right:0;background:linear-gradient(270deg,rgba(22,36,63,.20),rgba(22,36,63,.05) 50%,transparent)}
.mode-single .face.front::after{left:0;width:18px;background:linear-gradient(90deg,rgba(22,36,63,.14),transparent)}

/* ---------- shared page shell ---------- */
.pg{position:absolute;inset:0;display:flex;flex-direction:column;padding:clamp(16px,3.2vmin,26px);overflow:hidden}
.sechead{margin-bottom:12px}
.sechead .k{font-size:10.5px;letter-spacing:.26em;color:var(--orange);font-weight:800}
.sechead h2{font-size:clamp(19px,4.2vmin,25px);color:var(--navy);font-weight:800;margin-top:5px;letter-spacing:.02em}
.sechead .bar{width:46px;height:3px;background:var(--orange);border-radius:2px;margin-top:9px}
.pgfoot{margin-top:auto;padding-top:8px;font-size:9.5px;color:var(--muted);letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center}
.pgfoot .b{font-family:Georgia,serif;font-style:italic;color:var(--navy);font-weight:800}

/* ---------- COVER ---------- */
.cover{background:
    radial-gradient(640px 440px at 80% 14%,rgba(240,120,0,.26),transparent 60%),
    repeating-linear-gradient(135deg,rgba(255,255,255,.03) 0 14px,transparent 14px 28px),
    linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 60%,#26395f 100%);
    color:#fff;justify-content:space-between;align-items:stretch}
.cover .ctop{flex:0 0 auto}
.cover .csy{font-family:Georgia,serif;font-style:italic;font-weight:800;font-size:clamp(24px,6.4vmin,36px);line-height:1}
.cover .csb{font-size:9.5px;letter-spacing:.2em;color:var(--orange-2);font-weight:700;margin-top:4px}
/* hero image */
.cover .cmid{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;padding:clamp(10px,2.4vmin,18px) 0}
.cover .coverimg{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;border-radius:12px;border:1px solid rgba(255,255,255,.14);box-shadow:0 18px 40px rgba(0,0,0,.4)}
/* product lockup */
.cover .clock{flex:0 0 auto;display:flex;flex-direction:column;gap:9px}
.cover h1{font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif;font-size:clamp(22px,6.4vmin,32px);font-weight:900;line-height:1.05;letter-spacing:.01em;white-space:nowrap}
.cover .nico{display:inline-grid;place-items:center;width:.92em;height:.92em;background:var(--orange);color:#fff;border-radius:50%;font-size:.82em;transform:translateY(.04em);margin-left:.04em}
.cover .crow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cover .sb{display:inline-block;background:#fff200;color:var(--navy);font-weight:900;font-size:clamp(12px,3.4vmin,16px);padding:5px 13px;border-radius:9px;transform:rotate(-2deg);box-shadow:0 5px 0 rgba(0,0,0,.18);white-space:nowrap}
.cover .badge{flex:0 0 auto;display:inline-flex;align-items:baseline;gap:4px;background:radial-gradient(circle at 30% 20%,#fff6e8,#ffb24d 55%,var(--orange));color:var(--navy);border:3px solid rgba(255,255,255,.25);border-radius:13px;padding:7px 14px;box-shadow:0 8px 22px rgba(0,0,0,.28)}
.cover .badge .s{font-size:11px;font-weight:900;letter-spacing:.04em}
.cover .badge .b{font-size:clamp(26px,7vmin,38px);font-weight:900;line-height:.95;letter-spacing:-.01em}
.cover .badge .b span{font-size:.4em;font-weight:800}
.cover .badge .s2{font-size:9px;font-weight:800;letter-spacing:.04em;align-self:flex-end;margin-bottom:3px}
.cover .foot{flex:0 0 auto;margin-top:11px;font-size:10.5px;color:rgba(255,255,255,.7);letter-spacing:.03em;display:flex;justify-content:space-between;align-items:center;gap:8px;white-space:nowrap;border-top:1px solid rgba(255,255,255,.12);padding-top:9px}
.cover .foot .hint{color:var(--orange-2);font-weight:700}

/* ---------- STRENGTHS ---------- */
.strength{background:var(--paper-2)}
.strength .lead{margin-top:2px;font-size:12.5px;color:var(--muted);line-height:1.7}
.strength .est{display:flex;align-items:center;gap:12px;margin:13px 0 4px;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;border-radius:12px;padding:12px 16px}
.strength .est .n{font-size:34px;font-weight:900;color:var(--orange-2);line-height:1;white-space:nowrap}
.strength .est .n span{font-size:.45em;color:#fff}
.strength .est .t{font-size:12.5px;line-height:1.5}
.strength .est .t b{font-size:14px}
.strength ul{list-style:none;margin-top:11px;display:grid;gap:9px}
.strength li{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 14px}
.strength li .ic{flex:0 0 30px;height:30px;border-radius:8px;background:rgba(240,120,0,.12);color:var(--orange);display:grid;place-items:center;font-size:16px;font-weight:800}
.strength li .tx b{display:block;font-size:13.5px;color:var(--navy);font-weight:800;margin-bottom:2px}
.strength li .tx span{font-size:11px;color:var(--muted);line-height:1.55}

/* ---------- LEASE INTRO (komikomi) ---------- */
.intro{background:var(--paper-2)}
.intro .hero{background:linear-gradient(135deg,var(--orange-2),var(--orange));color:#fff;border-radius:13px;padding:14px 16px;text-align:center}
.intro .hero .t{font-size:13px;font-weight:700;letter-spacing:.05em}
.intro .hero .big{font-size:clamp(22px,6vmin,32px);font-weight:900;line-height:1.1;margin-top:4px}
.intro .hero .big em{font-style:normal;color:#fff200}
.intro .hero .from{display:inline-flex;align-items:baseline;gap:3px;background:#fff;color:var(--red);border-radius:9px;padding:4px 12px;margin-top:9px;font-weight:900}
.intro .hero .from .n{font-size:26px}
.intro .hero .from .u{font-size:11px;color:var(--muted)}
.intro .komi{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:13px}
.intro .komi .c{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 4px;text-align:center}
.intro .komi .c .ic{font-size:18px}
.intro .komi .c b{display:block;font-size:11px;color:var(--navy);margin-top:3px;font-weight:800}
.intro .desc{margin-top:13px;font-size:12px;color:var(--ink);line-height:1.85}
.intro .desc b{color:var(--orange)}

/* ---------- PAYMENT (carlease appeal) ---------- */
.pay{background:var(--paper-2)}
.pay .lead{font-size:11px;color:var(--ink);line-height:1.55;margin-top:1px}
.pay .lead b{color:var(--orange)}
/* initial-cost comparison */
.pay .costttl{font-size:11px;font-weight:800;color:var(--navy);letter-spacing:.04em;margin:9px 0 5px;display:flex;align-items:center;gap:7px}
.pay .costttl::before{content:"";width:4px;height:14px;background:var(--orange);border-radius:2px}
.pay .cost{display:flex;flex-direction:column;gap:6px}
.pay .cr{display:flex;align-items:center;gap:9px}
.pay .cr .nm{flex:0 0 84px;font-size:10.5px;font-weight:800;color:var(--muted);line-height:1.3}
.pay .cr .track{flex:1;height:23px;background:#eef1f6;border-radius:7px;position:relative;overflow:hidden}
.pay .cr .fill{position:absolute;top:0;left:0;height:100%;border-radius:7px;display:flex;align-items:center;padding:0 9px;font-size:10px;font-weight:800;color:#fff;white-space:nowrap}
.pay .cr.cash .nm{color:var(--navy)} .pay .cr.cash .fill{background:#9aa6bd}
.pay .cr.loan .nm{color:var(--navy)} .pay .cr.loan .fill{background:#6b7790}
.pay .cr.lease .nm{color:var(--orange)} .pay .cr.lease .fill{background:linear-gradient(90deg,var(--orange-2),var(--orange));box-shadow:0 3px 10px rgba(240,120,0,.35)}
.pay .cr.lease .track{flex:0 1 auto;width:34%;background:rgba(240,120,0,.12);border:1px solid rgba(240,120,0,.3)}
.pay .cr .val{font-size:11px;font-weight:800;color:var(--orange);white-space:nowrap}
.pay .cr .zero{color:var(--orange);font-weight:900;font-size:14px}
.pay .point{margin-top:8px;background:#fff;border:1.5px solid var(--orange);border-radius:11px;padding:8px 11px;display:flex;align-items:center;gap:9px}
.pay .point .big{font-size:22px;font-weight:900;color:var(--orange);line-height:1;white-space:nowrap}
.pay .point .big small{font-size:10.5px}
.pay .point .tx{font-size:10.5px;color:var(--ink);line-height:1.45}.pay .point .tx b{color:var(--navy)}
/* merit chips */
.pay .four{display:flex;flex-wrap:nowrap;gap:4px;margin-top:8px}
.pay .four span{flex:1;text-align:center;font-size:9.5px;font-weight:800;color:var(--navy);background:rgba(240,120,0,.1);border:1px solid rgba(240,120,0,.25);border-radius:999px;padding:4px 4px}
/* plans (compact pills) */
.pay .plans{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:7px}
.pay .plan{border:1px solid var(--line);border-radius:10px;padding:7px 5px 8px;text-align:center;background:#fff}
.pay .plan .pt{font-size:9.5px;color:#fff;font-weight:800;padding:2px 8px;border-radius:999px;display:inline-block}
.pay .plan.p1 .pt{background:var(--orange)} .pay .plan.p2 .pt{background:var(--pink)} .pay .plan.p3 .pt{background:var(--blue)}
.pay .plan .pm{font-size:16px;font-weight:900;color:var(--red);margin-top:4px;line-height:1.05}
.pay .plan .pm small{font-size:9.5px;color:var(--muted);font-weight:700}
.pay .end{margin-top:7px;font-size:9.5px;color:var(--muted);line-height:1.55}
.pay .end b{color:var(--navy)}

/* ---------- PLAN (cars grid) ---------- */
.planpg{background:var(--paper)}
.planpg .phead{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.planpg .pl{display:flex;align-items:center;gap:9px}
.planpg .ptag{font-size:11px;font-weight:900;color:#fff;padding:4px 12px;border-radius:999px;letter-spacing:.04em}
.planpg.p1 .ptag{background:var(--orange)} .planpg.p2 .ptag{background:var(--pink)} .planpg.p3 .ptag{background:var(--blue)}
.planpg .pcat{font-size:13px;font-weight:800;color:var(--navy)}
.planpg .pprice{display:flex;align-items:baseline;gap:2px;font-weight:900}
.planpg .pprice .pm{font-size:23px;color:var(--red)}
.planpg .pprice .u{font-size:10.5px;color:var(--muted);font-weight:700}
.planpg .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex:1}
.planpg .car{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;min-height:0}
.planpg .car .ph{flex:1;min-height:0;background:linear-gradient(180deg,#f4f6fa,#eef1f6);display:grid;place-items:center;padding:5px}
.planpg .car .ph img{width:100%;height:100%;object-fit:contain}
.planpg .car .cap{padding:5px 7px 7px;text-align:center}
.planpg .car .cap b{display:block;font-size:11.5px;color:var(--navy);font-weight:800;line-height:1.2}
.planpg .car .cap span{font-size:9px;color:var(--muted)}

/* ---------- PACKS ---------- */
.packs{background:var(--paper-2)}
.packs .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}
.packs .pk{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.packs .pk .hd{padding:10px 13px;color:#fff}
.packs .pk.a .hd{background:linear-gradient(135deg,var(--orange-2),var(--orange))}
.packs .pk.b .hd{background:linear-gradient(135deg,#34c3e8,#0a7fb0)}
.packs .pk .hd .tg{display:inline-block;background:rgba(255,255,255,.25);font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:999px;margin-bottom:3px}
.packs .pk .hd h3{font-size:15px;font-weight:900}
.packs .pk .hd p{font-size:10px;opacity:.95}
.packs .pk ul{list-style:none;padding:9px 12px;flex:1;display:grid;gap:4px}
.packs .pk li{font-size:10.5px;color:var(--ink);padding-left:15px;position:relative;line-height:1.4}
.packs .pk li::before{content:"✓";position:absolute;left:0;color:var(--orange);font-weight:900}
.packs .pk.b li::before{color:var(--blue)}
.packs .pk .pr{padding:8px 12px 11px;text-align:center;background:var(--paper-2)}
.packs .pk .pr .pm{font-size:17px;font-weight:900;color:var(--orange)}
.packs .pk.b .pr .pm{color:#0a7fb0}
.packs .pk .pr small{font-size:9.5px;color:var(--muted)}
.packs .w{margin-top:10px;background:var(--navy);color:#fff;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:11px}
.packs .w .pl{font-weight:900;font-size:15px;background:var(--orange);padding:4px 10px;border-radius:8px;white-space:nowrap}
.packs .w p{font-size:11px;line-height:1.5}.packs .w b{color:var(--orange-2)}

/* ---------- ABOUT (mechanism + 4 choices) ---------- */
.about{background:var(--paper-2)}
.about .lead{font-size:12px;color:var(--ink);line-height:1.85;margin-top:2px}
.about .lead b{color:var(--orange)}
.about .h3{font-size:12.5px;font-weight:800;color:var(--orange);letter-spacing:.06em;margin:14px 0 9px}
.about .four{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.about .ch{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;position:relative}
.about .ch .no{position:absolute;top:-7px;left:11px;width:22px;height:22px;background:var(--orange);color:#fff;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:11px}
.about .ch b{display:block;font-size:12.5px;color:var(--navy);font-weight:800;margin:6px 0 3px}
.about .ch span{font-size:10.5px;color:var(--muted);line-height:1.55}

/* ---------- COMPARE ---------- */
.compare{background:var(--paper-2)}
.compare table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-top:2px}
.compare th,.compare td{padding:8px 7px;text-align:center;border-bottom:1px solid var(--line);font-size:10px;vertical-align:middle}
.compare thead th{background:#f3f5f9;font-weight:800;color:var(--navy);font-size:11px}
.compare thead th.us{background:var(--orange);color:#fff}
.compare thead th small{display:block;font-weight:600;font-size:8px;opacity:.9}
.compare .rh{background:#fbe9d4;color:var(--orange);font-weight:800;width:62px;font-size:10px}
.compare td.us{background:#fff6e9}
.compare td b{display:block;color:var(--navy);margin-bottom:2px;font-size:10.5px}
.compare td.us b{color:var(--orange)}
.compare td small{display:block;color:var(--muted);font-size:8.5px;line-height:1.4;font-weight:500}
.compare tr:last-child td,.compare tr:last-child th{border-bottom:none}

/* ---------- VOICES ---------- */
.voices{background:var(--paper-2)}
.voices .grid{display:grid;gap:9px;margin-top:2px;flex:1;align-content:center}
.voices .v{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 14px;position:relative}
.voices .v p{font-size:12px;color:var(--ink);font-weight:600;line-height:1.6}
.voices .v cite{display:block;text-align:right;margin-top:5px;font-style:normal;font-size:10.5px;color:var(--orange);font-weight:800}
.voices .v::before{content:"“";position:absolute;top:-2px;left:6px;font-family:Georgia,serif;font-size:30px;color:var(--orange);opacity:.2}

/* ---------- FAQ ---------- */
.faq{background:var(--paper-2)}
.faq .list{display:grid;gap:8px;margin-top:2px;flex:1;align-content:start}
.faq .qa{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px}
.faq .q{display:flex;gap:8px;font-size:12px;font-weight:800;color:var(--navy);line-height:1.4}
.faq .q .qi{flex:0 0 18px;height:18px;background:var(--orange);color:#fff;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:900}
.faq .a{display:flex;gap:8px;font-size:11px;color:var(--muted);line-height:1.55;margin-top:5px}
.faq .a .ai{flex:0 0 18px;height:18px;background:var(--navy);color:#fff;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:900}

/* ---------- CSY divider ---------- */
.csyp{background:radial-gradient(620px 460px at 70% 30%,rgba(240,120,0,.14),transparent 62%),linear-gradient(150deg,var(--navy),var(--navy-2));color:#fff;align-items:center;justify-content:center;text-align:center}
.csyp .csy{font-family:Georgia,serif;font-style:italic;font-weight:800;font-size:clamp(38px,11vmin,60px);line-height:1}
.csyp .csb{font-size:11px;letter-spacing:.3em;color:var(--orange-2);font-weight:700;margin-top:10px}
.csyp .ln{margin-top:18px;font-size:12px;letter-spacing:.14em;color:rgba(255,255,255,.62)}

/* ---------- STORES ---------- */
.stores{background:var(--paper-2)}
.stores .shead{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
.stores .shead .t{font-size:clamp(16px,3.6vmin,21px);font-weight:800;color:var(--navy)}
.stores .shead .ix{font-size:11px;color:var(--orange);font-weight:800;letter-spacing:.1em}
.stores .list{display:flex;flex-direction:column;gap:6px;flex:1;justify-content:center}
.store{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px}

const pages=[];

const book=document.getElementById('book');
const viewport=document.getElementById('viewport');
const elPrev=document.getElementById('prev'),elNext=document.getElementById('next');
const elCur=document.getElementById('cur'),elTot=document.getElementById('tot'),elTtl=document.getElementById('ttl');
const mqDesktop=window.matchMedia('(min-width:1024px)');
let mode=null,papers=[],loc=1;
function faceHTML(idx){return idx>=pages.length?backHTML():pages[idx].html;}

/* SPREAD (desktop) */
function buildSpread(){
  mode='spread';
  viewport.className='viewport mode-spread';
  book.style.setProperty('--pw','min(45vw, calc((100vh - 188px) * 0.72))');
  book.style.setProperty('--ph','calc(min(45vw, calc((100vh - 188px) * 0.72)) * 4 / 3)');
  book.innerHTML='';papers=[];
  const leaves=Math.ceil((pages.length+1)/2);
  for(let p=0;p<leaves;p++){
    const paper=document.createElement('div');
    paper.className='paper';paper.style.zIndex=leaves-p;
    paper.innerHTML=`<div class="face front">${faceHTML(2*p)}</div><div class="face back">${faceHTML(2*p+1)}</div>`;
    book.appendChild(paper);papers.push(paper);
  }
  loc=1;applySpread();
}
function applySpread(){
  const n=papers.length;
  if(loc===1)book.style.transform='translateX(0%)';
  else if(loc===n+1)book.style.transform='translateX(100%)';
  else book.style.transform='translateX(50%)';
  const f=loc-1;let title;
  if(f===0)title=pages[0].t;
  else{const li=2*f-1,ri=2*f;const lt=li<pages.length?pages[li].t:'裏表紙';const rt=ri<pages.length?pages[ri].t:'裏表紙';title=`${lt}　／　${rt}`;}
  elTtl.textContent=title;elCur.textContent=loc;elTot.textContent=n+1;
  elPrev.disabled=loc===1;elNext.disabled=loc===n+1;
}
function spreadNext(){if(loc>papers.length)return;const p=papers[loc-1];p.classList.add('flipped');p.style.zIndex=loc;loc++;applySpread();}
function spreadPrev(){if(loc<=1)return;loc--;const p=papers[loc-1];p.classList.remove('flipped');p.style.zIndex=papers.length-(loc-1);applySpread();}

/* SINGLE (mobile/tablet) */
function buildSingle(){
  mode='single';
  viewport.className='viewport mode-single';
  book.style.setProperty('--ph','min(82vh, calc(94vw / 0.66))');
  book.style.setProperty('--pw','calc(min(82vh, calc(94vw / 0.66)) * 0.66)');
  book.style.transform='none';
  book.innerHTML='';papers=[];
  pages.forEach((pg,i)=>{
    const paper=document.createElement('div');
    paper.className='paper';paper.style.zIndex=pages.length-i;
    paper.innerHTML=`<div class="face front">${faceHTML(i)}</div><div class="face back" style="background:#0e1830"></div>`;
    book.appendChild(paper);papers.push(paper);
  });
  loc=1;applySingle();
}
function applySingle(){
  elTtl.textContent=pages[loc-1].t;elCur.textContent=loc;elTot.textContent=pages.length;
  elPrev.disabled=loc===1;elNext.disabled=loc===pages.length;
}
function singleNext(){if(loc>=pages.length)return;const p=papers[loc-1];p.classList.add('flipped');p.style.zIndex=0;loc++;applySingle();}
function singlePrev(){if(loc<=1)return;loc--;const p=papers[loc-1];p.classList.remove('flipped');p.style.zIndex=pages.length-(loc-1);applySingle();}

function goNext(){mode==='spread'?spreadNext():singleNext();}
function goPrev(){mode==='spread'?spreadPrev():singlePrev();}
elNext.addEventListener('click',goNext);
elPrev.addEventListener('click',goPrev);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev();});
let sx=null;
book.addEventListener('touchstart',e=>{sx=e.changedTouches[0].clientX;},{passive:true});
book.addEventListener('touchend',e=>{if(sx===null)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>45){dx<0?goNext():goPrev();}sx=null;},{passive:true});
book.addEventListener('click',e=>{if(e.target.closest('a'))return;const r=book.getBoundingClientRect();(e.clientX-r.left>r.width/2)?goNext():goPrev();});
function init(){mqDesktop.matches?buildSpread():buildSingle();}
let curDesktop=mqDesktop.matches;
const onChange=()=>{if(mqDesktop.matches!==curDesktop){curDesktop=mqDesktop.matches;init();}};
mqDesktop.addEventListener?mqDesktop.addEventListener('change',onChange):mqDesktop.addListener(onChange);
init();
</script>
